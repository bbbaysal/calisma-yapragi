<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kesirli Sayılarda İşlemler - Çalışma Yaprağı</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 30px; color: #333; }
        .no-print { background: #f8f9fa; padding: 20px; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 30px; }
        .control-group { display: inline-block; margin-right: 20px; margin-bottom: 10px; }
        .control-group label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 14px; }
        select, input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 5px; }
        button { padding: 10px 18px; font-size: 14px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; }
        .worksheet-header { text-align: center; margin-bottom: 30px; border-bottom: 3px double #333; padding-bottom: 15px; }
        .student-info { display: flex; justify-content: space-between; margin-bottom: 30px; font-weight: bold; }
        .questions-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px 60px; }
        .question-item { display: flex; align-items: center; font-size: 22px; page-break-inside: avoid; padding-bottom: 15px; border-bottom: 1px dashed #cbd5e1; }
        .math-expr { display: inline-flex; align-items: center; font-family: 'Times New Roman', serif; font-style: italic; }
        .fraction { display: inline-flex; flex-direction: column; text-align: center; padding: 0 6px; }
        .numerator { border-bottom: 2px solid #333; padding-bottom: 2px; font-size: 20px; }
        .denominator { padding-top: 2px; font-size: 20px; }
        .op { padding: 0 12px; font-size: 24px; font-weight: bold; font-style: normal; }
        .minus { font-size: 24px; font-style: normal; padding-right: 2px; }
        .answer-key-section { page-break-before: always; margin-top: 50px; }
        .answer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .answer-item { display: flex; align-items: center; font-size: 18px; padding: 8px; background: #f1f5f9; border-radius: 4px; border-left: 4px solid #3b82f6; }
        @media print { .no-print { display: none !important; } body { margin: 0; } .answer-item { background: none !important; border: 1px solid #cbd5e1; } }
    </style>
</head>
<body>

    <div class="no-print">
        <h2>🛠️ Kesirli Sayılar Çalışma Yaprağı</h2>
        <div class="control-group">
            <label>🎯 İşlem:</label>
            <select id="topicSelect" onchange="calismaYapragiUret()">
                <option value="karisik">Karışık Dört İşlem</option>
                <option value="+">+</option><option value="-">-</option><option value="×">×</option><option value="÷">÷</option>
            </select>
        </div>
        <div class="control-group">
            <label>⚡ Zorluk:</label>
            <select id="difficultySelect" onchange="calismaYapragiUret()">
                <option value="kolay">Kolay (Paydalar Eşit)</option>
                <option value="orta" selected>Orta (Rastgele Paydalar)</option>
                <option value="zor">Zor (Negatifler Dahil)</option>
            </select>
        </div>
        <div class="control-group">
            <label>📝 Soru Sayısı:</label>
            <input type="number" id="questionCount" value="20" min="4" max="100" style="width: 60px;">
        </div>
        <button onclick="calismaYapragiUret()" style="background: #3b82f6; color: white;">🔄 Yenile</button>
        <button onclick="window.print()" style="background: #22c55e; color: white; margin-left: 10px;">🖨️ Yazdır / PDF</button>
        <a href="index.html" style="text-decoration: none;"><button type="button" style="background: #64748b; color: white; margin-left: 10px; cursor: pointer;">🏠 Ana Sayfa</button></a>
    </div>

    <div id="worksheet">
        <div class="worksheet-header"><h2>KESİRLERDE DÖRT İŞLEM ÇALIŞMA YAPRAĞI</h2></div>
        <div class="student-info">
            <div>Adı Soyadı: ...................................................</div>
            <div>Sınıfı / No: ....................</div>
            <div>Tarih: .... / .... / 20...</div>
        </div>
        <div class="questions-grid" id="questionsContainer"></div>
    </div>

    <div class="answer-key-section">
        <div class="worksheet-header" style="border-bottom: 2px solid #333;"><h2>🔑 CEVAP ANAHTARI</h2></div>
        <div class="answer-grid" id="answersContainer"></div>
    </div>

    <script>
        function ebob(a, b) { return b === 0 ? Math.abs(a) : ebob(b, a % b); }
        
        function rastgeleSayi(min, max) {
            let s = Math.floor(Math.random() * (max - min + 1)) + min;
            return s === 0 ? rastgeleSayi(min, max) : s;
        }

        function Kesir(p, pd) {
            let ob = ebob(p, pd || 1);
            this.pay = p / ob;
            this.payda = (pd || 1) / ob;
            if (this.payda < 0) { this.pay = -this.pay; this.payda = -this.payda; }
        }

        function kesirYaz(k) {
            if (k.payda === 1) return `${k.pay}`;
            let eksi = k.pay < 0 ? '<span class="minus">-</span>' : '';
            return `<div class="math-expr">${eksi}<div class="fraction"><div class="numerator">${Math.abs(k.pay)}</div><div class="denominator">${k.payda}</div></div></div>`;
        }

        function calismaYapragiUret() {
            const qc = document.getElementById("questionsContainer");
            const ac = document.getElementById("answersContainer");
            const count = parseInt(document.getElementById("questionCount").value) || 20;
            const topic = document.getElementById("topicSelect").value;
            const diff = document.getElementById("difficultySelect").value;
            
            qc.innerHTML = ""; ac.innerHTML = "";
            const ops = ['+', '-', '×', '÷'];

            for (let i = 1; i <= count; i++) {
                let op = topic === "karisik" ? ops[Math.floor(Math.random() * 4)] : topic;
                let p1, pd1, p2, pd2;

                if (diff === "kolay") {
                    pd1 = rastgeleSayi(2, 6); pd2 = (op==='+'||op==='-') ? pd1 : rastgeleSayi(2, 5);
                    p1 = rastgeleSayi(1, pd1-1); p2 = rastgeleSayi(1, pd2-1);
                } else if (diff === "orta") {
                    pd1 = rastgeleSayi(2, 8); pd2 = rastgeleSayi(2, 8);
                    p1 = rastgeleSayi(1, pd1+1); p2 = rastgeleSayi(1, pd2+1);
                } else {
                    pd1 = rastgeleSayi(2, 12); pd2 = rastgeleSayi(2, 12);
                    p1 = rastgeleSayi(-8, 8); p2 = rastgeleSayi(-8, 8);
                }

                let k1 = new Kesir(p1, pd1), k2 = new Kesir(p2, pd2), kr;

                if (op === '+') kr = new Kesir((k1.pay * k2.payda) + (k2.pay * k1.payda), k1.payda * k2.payda);
                if (op === '-') {
                    if(diff === "kolay" && (k1.pay/k1.payda < k2.pay/k2.payda)) { let t=k1; k1=k2; k2=t; }
                    kr = new Kesir((k1.pay * k2.payda) - (k2.pay * k1.payda), k1.payda * k2.payda);
                }
                if (op === '×') kr = new Kesir(k1.pay * k2.pay, k1.payda * k2.payda);
                if (op === '÷') {
                    while(k2.pay === 0) { k2 = new Kesir(rastgeleSayi(1, 4), pd2); }
                    kr = new Kesir(k1.pay * k2.payda, k1.payda * k2.pay);
                }

                qc.innerHTML += `<div class="question-item"><strong>${i})</strong>${kesirYaz(k1)}<span class="op">${op}</span>${kesirYaz(k2)}<span class="op">=</span></div>`;
                ac.innerHTML += `<div class="answer-item"><strong>S${i}:</strong>${kesirYaz(kr)}</div>`;
            }
        }
        window.onload = calismaYapragiUret;
    </script>
</body>
</html>
